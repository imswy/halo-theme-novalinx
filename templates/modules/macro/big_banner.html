<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="big_banner(title)">
  <!--    大图配置-->
  <script th:inline="javascript">
    // 以下配置参数均为默认值
    new EvanBigBanner({
      followMode: false,                       // 跟随模式
      followTheme: false,                      // 跟随主题
      titlePrint: true,                        // 是否启用打字机效果
      titlePrintInterval: 300,                 // 打字机速度
      titleTiktok: false,                      // 标题文字抖音效果
      titleText: /*[[${(theme.config.beauty.big_banner_title != null and theme.config.beauty.big_banner_title != '') ? theme.config.beauty.big_banner_title : site.title}]]*/ "",    // 标题文字
      titleColor: "#ffffff",                   // 标题文字颜色
      titleShadow: "-3px 2px 6px #1c1f21",     // 标题文字阴影
      hitokotoParams: {},                      // 一言参数，参考：https://developer.hitokoto.cn/sentence/#%E8%AF%B7%E6%B1%82%E5%8F%82%E6%95%B0
      hitokotoApi: "https://v1.hitokoto.cn",   // 一言API
      hitokotoColor: "#ffffff",                // 一言文字颜色
      hitokotoEnable: /*[[${theme.config.beauty.enable_big_banner_hitokoto}]]*/true,                    // 是否使用一言
    });

    // 以上配置均为默认值，可直接使用进行初始化
    // new EvanBigBanner();

  </script>
  <div id="EvanBigBanner" class="evan-big-banner"
    th:style="'background-image:url('+${theme.config.beauty.big_banner_Photos}+');'+${htmlType == 'index'? 'height:calc(100vh - 60px);margin-top: initial;':''}">
    <th:block th:if="${theme.config.beauty.enable_big_banner_video}">
      <video id="EvanBigBannerVideo" class="video" preload="auto" loop="" autoplay="" muted=""
        th:src="${theme.config.beauty.big_banner_video}" style="width: 100%;height: 100%;object-fit: cover;">
      </video>
    </th:block>
    <div class="absolute leading-loose">
      <div id="EvanBigBanner_Title"
        class="text-[2rem] font-bold text-white text-center tracking-[0.3rem] [text-shadow:0_0.1875rem_0.3125rem_var(#1c1f21)]">
        <!-- 标题区域 -->
        <span id="EvanBigBanner_SubTitle" style="opacity: 0;">
          [[${htmlType == 'index'? site.title : title}]]
        </span>
      </div>
      <div
        class="hitokoto_desctitle flex flex-col items-center justify-center text-center text-[#f3f3f3] text-base px-4 py-0 [text-shadow:0_0.1875rem_0.3125rem_var(#1c1f21)]">
        <div id="HitokotoText" class="motto joe_motto [text-shadow:none]">
          <!-- 一言，内容 -->
        </div>
        <div id="HitokotoForm" class="motto joe_motto text-sm [text-shadow:none]">
          <!-- 一言，作者 -->
        </div>
      </div>
    </div>
    <th:block th:if="${htmlType == 'index'}">
      <a href="#" class="absolute -translate-x-2/4 left-2/4 bottom-[100px]" id="evan-big-banner_goto">
        <span
          class="text-2xl text-white animate-[aniIndexGotoIcon_2s_ease-in-out_infinite] inline-block jiewen joe-icon-xiangxia"></span>
      </a>
    </th:block>
    <section class="evan-big-banner_bottom" id="indexPosition">
      <svg id="EvanWaves" class="waves-svg" xmlns="http://www.w3.org/2000/svg"
        xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 24 150 28" preserveAspectRatio="none"
        shape-rendering="auto">
        <defs>
          <path id="gentle-wave" d="M -160 44 c 30 0 58 -18 88 -18 s 58 18 88 18 s 58 -18 88
                    -18 s 58 18 88 18 v 44 h -352 Z"></path>
        </defs>
        <g class="parallax">
          <use xlink:href="#gentle-wave" fill="#fff" x="48" y="0"></use>
          <use xlink:href="#gentle-wave" fill="#fff" x="48" y="3"></use>
          <use xlink:href="#gentle-wave" fill="#fff" x="48" y="5"></use>
          <use xlink:href="#gentle-wave" fill="#fff" x="48" y="7"></use>
        </g>
      </svg>
    </section>
  </div>
</th:block>

</html>
